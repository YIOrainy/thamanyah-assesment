services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thmanyah
      POSTGRES_PASSWORD: thmanyah
      POSTGRES_DB: thmanyah
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thmanyah"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # --- migrations (runs once, then exits) ---
  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://thmanyah:thmanyah@postgres:5432/thmanyah?sslmode=disable"
      - "up"

  # --- application ---
  cms:
    image: thmanyah-app:latest
    build: .
    command: ["/app/cms", "-config", "/app/config.yaml"]
    ports:
      - "${CMS_HOST_PORT:-8080}:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  discovery:
    image: thmanyah-app:latest
    build: .
    command: ["/app/discovery", "-config", "/app/config.yaml"]
    ports:
      - "${DISCOVERY_HOST_PORT:-8081}:8081"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  # --- observability ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach host-run binaries on Linux

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - "${PYROSCOPE_PORT:-4040}:4040"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - pyroscope
